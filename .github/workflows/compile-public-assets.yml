# Précompile public/assets/ (importmap + Tailwind + asset-map) et pousse le résultat sur la branche courante.
# Le message de commit contient [skip ci] pour limiter les relances en boucle.
name: Précompiler public/assets et commit

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - develop
      - feat/symfony-app
    paths:
      - 'assets/**'
      - 'importmap.php'
      - 'templates/**'
      - 'composer.lock'
      - 'composer.json'
      - 'config/packages/**'
      - '.github/workflows/compile-public-assets.yml'
      - '!public/assets/**'

concurrency:
  group: compile-public-assets-${{ github.ref }}
  cancel-in-progress: false

jobs:
  compile-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_sqlite, opcache, zip
          tools: composer

      - name: Setup Node (build React / Ishikawa)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: assets/react-src/build/package-lock.json

      - name: Fichier .env minimal (prod console)
        run: |
          cat > .env << 'EOF'
          APP_ENV=prod
          APP_SECRET=github-actions-compile-assets-only
          APP_DEBUG=0
          DATABASE_URL="sqlite:///%kernel.project_dir%/var/data_ci.db"
          APP_URL=https://localhost
          DEFAULT_URI=https://localhost
          APP_EMAIL=compile@localhost
          MAILER_DSN=null://null
          MESSENGER_TRANSPORT_DSN=in-memory://
          MAUTIC_URL=
          MAUTIC_USER=
          MAUTIC_PASSWORD=
          MAUTIC_FORM_NEWSLETTER_ID=0
          MAUTIC_FORM_DOWNLOAD_5M_ID=0
          DOWNLOAD_SECRET=ci_compile_assets_only
          DOWNLOAD_BASE_PATH=/tmp
          DOWNLOAD_AUTHORIZE_API_KEY=
          EOF

      - name: Composer (prod, sans scripts auto)
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --no-scripts --prefer-dist --no-progress

      - name: Build Ishikawa (esbuild → assets/react/controllers)
        working-directory: assets/react-src/build
        run: |
          npm ci
          npm run build

      - name: Importmap + Tailwind + asset-map
        env:
          TMPDIR: ${{ runner.temp }}/symfony-assets
        run: |
          mkdir -p "${TMPDIR}"
          php bin/console importmap:install --env=prod --no-debug --no-interaction
          php bin/console tailwind:build --minify --env=prod --no-debug --no-interaction
          php bin/console asset-map:compile --env=prod --no-debug --no-interaction

      - name: Commit public/assets si changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- public/assets; then
            echo "Aucun changement dans public/assets — rien à committer."
            exit 0
          fi
          git add public/assets/
          git commit -m "chore(assets): précompilation importmap/tailwind/asset-map [skip ci]"
          git push
