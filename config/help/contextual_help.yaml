# --- Verdicts audit ---
help.audit.verdict.not_evaluated:
  title: Non évalué
  description: Exigence pas encore notée. À compléter avant clôture de l’audit.
  badge: Verdict

help.audit.verdict.conform:
  title: Conforme
  description: Exigence respectée, preuves suffisantes.
  badge: Verdict

help.audit.verdict.observation:
  title: Observation
  description: Point d’amélioration sans écart formel. Une CAPA peut être proposée manuellement.
  badge: Verdict

help.audit.verdict.minor_nc:
  title: NC mineure
  description: Écart limité n’affectant pas la conformité globale. Déclenche en général une CAPA.
  badge: Verdict
  example: 'Ex. : enregistrement incomplet sur un point secondaire.'

help.audit.verdict.major_nc:
  title: NC majeure
  description: Écart significatif pouvant remettre en cause la conformité. Déclenche en général une CAPA.
  badge: Verdict
  example: 'Ex. : absence de procédure documentée sur un point critique.'

help.audit.verdict.to_review:
  title: À revoir
  description: Évaluation provisoire à confirmer après complément d’information.
  badge: Verdict

help.audit.verdict.not_applicable:
  title: N/A
  description: Exigence hors périmètre de l’audit ou non applicable à l’organisation.
  badge: Verdict

# --- Création audit (formulaire nouveau) ---
help.audit.field.main_auditor:
  title: Auditeur principal
  description: Personne qui conduit l’audit sur le terrain ou en interne. Indiquez le nom complet ou la fonction (ex. responsable qualité, auditeur interne certifié).
  badge: Audit
  example: 'Ex. : Marie Dupont — Responsable QSE'

help.audit.field.concerned_process:
  title: Processus concerné
  description: Processus ou activité audité (production, achats, RH, maintenance…). Aide à cadrer les exigences du référentiel sur le terrain.
  badge: Audit
  example: 'Ex. : Processus achats & approvisionnements'

help.audit.field.scope:
  title: Périmètre
  description: 'Limites de l’audit : sites, départements, produits, période couverte. Un périmètre clair évite les ambiguïtés lors de la saisie des exigences.'
  badge: Audit
  example: 'Ex. : Site de Lyon — atelier assemblage — T1 2026'

help.audit.field.objective:
  title: Objectif
  description: 'Finalité de l’audit : initial, surveillance, renouvellement, fournisseur, suite à une NC… Précise le contexte pour le rapport.'
  badge: Audit
  example: 'Ex. : Audit de surveillance avant renouvellement ISO 9001'

help.audit.field.audit_version:
  title: Version du rapport
  description: Numéro de version du rapport d’audit (1.0 à la création). Incrémentez lors des révisions du document exporté.
  badge: Audit
  example: 'Ex. : 1.0 — brouillon initial'

# --- PDCA ---
help.pdca.phase.plan:
  title: Plan
  description: Anticiper les risques, structurer les analyses et programmer les audits.
  badge: PDCA

help.pdca.phase.do:
  title: Do
  description: Déployer les actions correctives et traiter les CAPA ouvertes.
  badge: PDCA

help.pdca.phase.check:
  title: Check
  description: Mesurer les résultats via audits, indicateurs et analyses.
  badge: PDCA

help.pdca.phase.act:
  title: Act
  description: Analyser les causes racines et standardiser les actions efficaces.
  badge: PDCA

# --- CAPA workflow ---
help.capa.workflow:
  title: Avancement workflow
  description: Progression dans le cycle de vie CAPA (création → réalisation → vérification d’efficacité).
  badge: CAPA

# --- Risques ---
help.risk.criticality:
  title: Criticité
  description: Score combinant gravité, probabilité et maîtrise. Sert à prioriser le plan d’actions.
  badge: Risque

help.risk.matrix:
  title: Matrice des risques
  description: Représentation visuelle gravité × probabilité pour identifier les zones critiques.
  badge: Risque

help.risk.field.identified_risk:
  title: Risque identifié
  description: Intitulé court et explicite du risque tel qu’il apparaîtra dans votre registre et votre matrice.
  badge: Risque

help.risk.field.severity:
  title: Gravité
  description: Impact potentiel sur la conformité, la sécurité ou l’environnement si le risque se matérialise.
  badge: Risque

help.risk.field.probability:
  title: Probabilité
  description: Fréquence ou vraisemblance d’occurrence du risque dans le contexte actuel du processus.
  badge: Risque

help.risk.field.detection:
  title: Détection
  description: Capacité à détecter le risque avant qu’il n’ait d’effet (contrôles, audits, indicateurs). Une détection faible augmente le score.
  badge: Risque

help.risk.field.criticality:
  title: Criticité
  description: Score G×P×D calculé automatiquement. Sert à prioriser les actions et à alimenter la matrice des risques.
  badge: Risque

help.risk.field.category:
  title: Catégorie
  description: Domaine QSE concerné (qualité, sécurité, environnement, conformité, client, fournisseur).
  badge: Risque

help.risk.field.status:
  title: Statut
  description: Étape de traitement du risque. Un risque critique en « sous surveillance » doit être lié à au moins une CAPA.
  badge: Risque

help.risk.field.existing_actions:
  title: Actions existantes
  description: Mesures de maîtrise déjà déployées avant toute action corrective supplémentaire.
  badge: Risque

help.risk.field.responsible:
  title: Responsable
  description: Personne ou équipe chargée du suivi et de la mise à jour de la fiche risque.
  badge: Risque

